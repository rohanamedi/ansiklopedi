<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Yeni İller Haritası</title>
    <style>
        /* Sayfa ve harita için basit stiller */
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .harita-container {
            width: 100%;
            max-width: 1200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            display: block;
            width: 100%;
            height: 600px; /* Yüksekliği ihtiyacına göre ayarla */
            border: none;
        }
        /* Mobil cihazlar için uyum */
        @media (max-width: 768px) {
            iframe {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="harita-container">
        <!-- Verdiğin Google Haritalar gömme kodu buraya eklendi -->
        <iframe src="https://www.google.com/maps/d/embed?mid=1jNNEyiMfI5k6gVDgq_pA_7j216Yre9Q&hl=tr&ehbc=2E312F"></iframe>
    </div>
</body>
</html>
